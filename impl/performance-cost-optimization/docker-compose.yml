services:
  postgres:
    image: postgres:18.3-alpine3.23
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - dev

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq/mnesia
    networks:
      - dev

  redis:
    image: redis:8.8-m03-alpine3.23
    ports:
      - "6379:6379"
    networks:
      - dev
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:

networks:
  dev:
    driver: bridge
