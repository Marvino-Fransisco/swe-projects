services:
  postgres:
    image: postgres:18.3-alpine3.23
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - dev

  redis:
    image: redis:8.8-m03-alpine3.23
    ports:
      - "6379:6379"
    networks:
      - dev
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend:/app:cached
    command: sleep infinity
    ports:
      - "8000:8000"
    networks:
      - dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "3000:3000"
      - "5173:5173"
    networks:
      - dev

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:

networks:
  dev:
    driver: bridge
